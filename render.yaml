# Render Blueprint — API backend only (frontend on Vercel)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: nutrifit-api
    runtime: node
    plan: free
    buildCommand: npm install --prefix backend
    startCommand: npm start --prefix backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
